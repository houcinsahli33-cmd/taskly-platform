<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artisans - Taskly</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/api.js"></script>
  <script defer src="/js/algeria-locations.js"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="/js/artisans.js"></script>
</head>
<body data-active="artisans">
  <div id="site-header"></div>
  <main class="page-main">
    <section class="page-hero">
      <div class="container section-heading">
        <p class="eyebrow">Artisans Taskly</p>
        <h1>Comparez les artisans disponibles</h1>
        <p class="lead">Filtrez par service, wilaya, commune ou mot-clé pour trouver un profil adapté à votre demande.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="filters" id="artisans-filter-form">
          <label>
            <span class="field-label">Service</span>
            <select class="form-select" id="filter-service"></select>
          </label>
          <label>
            <span class="field-label">Wilaya</span>
            <select class="form-select" id="filter-wilaya"></select>
          </label>
          <label>
            <span class="field-label">Commune</span>
            <select class="form-select" id="filter-commune">
              <option value="">Choisir une commune</option>
            </select>
          </label>
          <label>
            <span class="field-label">Recherche</span>
            <input class="form-control" id="filter-search" placeholder="Nom, service, description">
          </label>
          <div class="request-actions">
            <button class="btn primary" type="submit" aria-label="Rechercher">Rechercher</button>
            <button class="btn outline" id="reset-filters" type="button" aria-label="Réinitialiser les filtres">Réinitialiser</button>
          </div>
        </form>
        <div class="grid three" id="artisans-grid"></div>
      </div>
    </section>
  </main>

  <div id="request-modal" class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>Envoyer une demande</h2>
        <button class="modal-close" type="button" data-close-modal="request-modal">×</button>
      </div>
      <form class="modal-body" id="request-form">
        <input type="hidden" id="request-artisan-id">
        <p class="muted" style="margin-bottom:18px">Artisan : <strong id="request-artisan-name"></strong></p>
        <label class="field-label" for="request-message">Message</label>
        <textarea class="form-textarea" id="request-message" required placeholder="Décrivez votre besoin"></textarea>
        <label class="field-label" for="request-address">Adresse</label>
        <input class="form-control" id="request-address" required placeholder="Adresse de l'intervention">
        <label class="field-label" for="request-date">Date souhaitée</label>
        <input class="form-control" id="request-date" type="date">
        <button class="btn primary block" type="submit" style="margin-top:18px">Envoyer</button>
      </form>
    </div>
  </div>
  <div id="site-footer"></div>
</body>
</html>
